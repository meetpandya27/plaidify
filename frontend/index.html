<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plaidify Operations Console</title>
  <style>
    :root {
      --bg: #0c0f14; --bg-card: #151921; --border: #232935;
      --text: #e0e4ec; --text-muted: #6b7280;
      --accent: #22c55e; --accent-hover: #16a34a;
      --danger: #ef4444;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; padding: 32px; max-width: 640px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 4px; }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 16px; margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; margin-top: 10px; }
    input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(34,197,94,.15); }
    button { margin-top: 14px; width: 100%; padding: 10px; background: var(--accent); color: #000; font-weight: 600; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; transition: background .15s; }
    button:hover { background: var(--accent-hover); }
    .result { margin-top: 10px; font-family: var(--mono); font-size: 13px; color: var(--text-muted); word-break: break-all; white-space: pre-wrap; }
    .result.error { color: var(--danger); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { margin-bottom: 24px; font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>
  <h1><span>Plaidify</span> Operations Console</h1>
  <p class="subtitle">Interact with the Plaidify API directly for link creation, credential submission, and data retrieval.</p>

  <div class="card">
    <h2>Create Link Token</h2>
    <form id="create-link-form">
      <label for="create-link-site">Site</label>
      <input type="text" id="create-link-site" name="create-link-site" placeholder="e.g. hydro_one" required />
      <button type="submit">Create Link</button>
    </form>
    <p id="create-link-result" class="result"></p>
  </div>

  <div class="card">
    <h2>Submit Credentials</h2>
    <form id="submit-credentials-form">
      <label for="submit-link-token">Link Token</label>
      <input type="text" id="submit-link-token" name="submit-link-token" placeholder="link_..." required />
      <label for="submit-username">Username</label>
      <input type="text" id="submit-username" name="submit-username" required />
      <label for="submit-password">Password</label>
      <input type="password" id="submit-password" name="submit-password" required />
      <button type="submit">Submit Credentials</button>
    </form>
    <p id="submit-credentials-result" class="result"></p>
  </div>

  <div class="card">
    <h2>Fetch Data</h2>
    <form id="fetch-data-form">
      <label for="fetch-access-token">Access Token</label>
      <input type="text" id="fetch-access-token" name="fetch-access-token" placeholder="access_..." required />
      <button type="submit">Fetch Data</button>
    </form>
    <p id="fetch-data-result" class="result"></p>
  </div>

  <script src="main.js"></script>
</body>
</html>
