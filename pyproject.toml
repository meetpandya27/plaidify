# Ruff configuration for Plaidify
# https://docs.astral.sh/ruff/

[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line length (handled by formatter)
    "B008",  # do not perform function calls in argument defaults (FastAPI Depends)
    "B017",  # broad exception assertions are acceptable in crypto-focused tests
    "B904",  # exception chaining is not required for HTTP/error translation paths
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "playwright: mark test as requiring a real Playwright browser (deselected by default)",
]

[tool.coverage.run]
source = ["src"]

[tool.coverage.report]
show_missing = true
fail_under = 73
